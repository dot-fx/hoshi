name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:

  build-frontend:
    name: Build frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: hoshi-frontend/package-lock.json

      - name: Build frontend
        run: |
          cd hoshi-frontend
          npm ci
          npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: hoshi-frontend/build

  build-server:
    name: Build server
    needs: build-frontend
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: hoshi-frontend/build

      - uses: dtolnay/rust-toolchain@stable

      - name: Build Axum server
        run: cargo build -p hoshi-server --release

      - name: Rename binary (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: mv target/release/hoshi-server target/release/hoshi-server-linux-${{ github.ref_name }}

      - name: Rename binary (macOS)
        if: matrix.os == 'macos-latest'
        run: mv target/release/hoshi-server target/release/hoshi-server-macos-${{ github.ref_name }}

      - name: Rename binary (Windows)
        if: matrix.os == 'windows-latest'
        run: mv target/release/hoshi-server.exe target/release/hoshi-server-windows-${{ github.ref_name }}.exe

      - name: Upload server artifact
        uses: actions/upload-artifact@v4
        with:
          name: server-${{ matrix.os }}
          path: target/release/hoshi-server-*

  build-desktop:
    name: Build Tauri desktop
    needs: build-frontend
    strategy:
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: hoshi-frontend/build

      - uses: dtolnay/rust-toolchain@stable

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-22.04'
        run: |
          sudo apt update
          sudo apt install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Build Tauri desktop (watchparty)
        run: tauri build --features watchparty

      - name: Rename Desktop Artifacts
        shell: bash
        run: |
          mkdir -p final-desktop
          VERSION=${{ github.ref_name }}
          
          # Linux
          find target/release/bundle -name "*.AppImage" -exec mv {} final-desktop/hoshi-desktop-linux-${VERSION}.AppImage \;
          find target/release/bundle -name "*.deb" -exec mv {} final-desktop/hoshi-desktop-linux-${VERSION}.deb \;
          find target/release/bundle -name "*.rpm" -exec mv {} final-desktop/hoshi-desktop-linux-${VERSION}.rpm \;
          
          # macOS
          find target/release/bundle -name "*.dmg" -exec mv {} final-desktop/hoshi-desktop-macos-${VERSION}.dmg \;
          
          # Windows
          find target/release/bundle -name "*.msi" -exec mv {} final-desktop/hoshi-desktop-windows-${VERSION}.msi \;
          find target/release/bundle -name "*-setup.exe" -exec mv {} final-desktop/hoshi-desktop-windows-${VERSION}-setup.exe \;

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-${{ matrix.os }}
          path: final-desktop/*

  build-android:
    name: Build Android
    needs: build-frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: hoshi-frontend/build

      - uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Clang, LLVM)
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm pkg-config libssl-dev

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@main
      - name: Install Tauri CLI
        run: cargo binstall tauri-cli -y

      - name: Add Android targets
        run: |
          rustup target add aarch64-linux-android
          rustup target add armv7-linux-androideabi
          rustup target add i686-linux-android
          rustup target add x86_64-linux-android

      - name: Setup Android
        uses: android-actions/setup-android@v3

      - name: Setup Android NDK & Bindgen Variables
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "ndk;29.0.13846066"
          
          NDK_PATH="$ANDROID_HOME/ndk/29.0.13846066"
          SYSROOT="$NDK_PATH/toolchains/llvm/prebuilt/linux-x86_64/sysroot"
          
          echo "ANDROID_NDK_HOME=$NDK_PATH" >> $GITHUB_ENV
          echo "NDK_SYSROOT=$SYSROOT" >> $GITHUB_ENV
          
          echo "BINDGEN_EXTRA_CLANG_ARGS_aarch64_linux_android=--sysroot=$SYSROOT -I$SYSROOT/usr/include -I$SYSROOT/usr/include/aarch64-linux-android" >> $GITHUB_ENV
          echo "BINDGEN_EXTRA_CLANG_ARGS_armv7_linux_androideabi=--sysroot=$SYSROOT -I$SYSROOT/usr/include -I$SYSROOT/usr/include/arm-linux-androideabi" >> $GITHUB_ENV
          echo "BINDGEN_EXTRA_CLANG_ARGS_i686_linux_android=--sysroot=$SYSROOT -I$SYSROOT/usr/include -I$SYSROOT/usr/include/i686-linux-android" >> $GITHUB_ENV
          echo "BINDGEN_EXTRA_CLANG_ARGS_x86_64_linux_android=--sysroot=$SYSROOT -I$SYSROOT/usr/include -I$SYSROOT/usr/include/x86_64-linux-android" >> $GITHUB_ENV

      - name: Build Android (no watchparty)
        run: cargo tauri android build --split-per-abi

      - name: Rename APKs
        run: |
          mkdir -p final-apks
          VERSION=${{ github.ref_name }}
          
          # Buscamos los nombres exactos que genera Gradle
          find hoshi-app/gen/android/app/build/outputs -name "*arm64*.apk" -exec mv {} final-apks/hoshi-android-arm64-${VERSION}.apk \;
          find hoshi-app/gen/android/app/build/outputs -name "*app-arm-*.apk" -exec mv {} final-apks/hoshi-android-arm32-${VERSION}.apk \;

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-apks
          path: final-apks/*.apk

  publish-release:
    name: Publish GitHub Release
    needs: [build-server, build-desktop, build-android]
    runs-on: ubuntu-latest
    steps:
      - name: Download Server artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: server-*
          path: all-artifacts
          merge-multiple: true

      - name: Download Desktop artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: desktop-*
          path: all-artifacts
          merge-multiple: true

      - name: Download Android artifacts
        uses: actions/download-artifact@v4
        with:
          name: android-apks
          path: all-artifacts

      - name: Publish to GitHub Releases
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: all-artifacts/**/*